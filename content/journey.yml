label: Journey
tagline: how I got here

entries:
  - date: "2024 - Now"
    title: "Senior Software Engineer · Opus, Savino del Bene"
    description: "Senior engineer working end to end on the logistics startup's platform for B2B shipping, from backend and frontend to the infra under it. Migrated the stack from a consultant-run setup to a company-owned Kubernetes (AKS) cluster and put CI/CD in place across every project."
  - date: "2022 - 2024"
    title: "Software Engineer · Engineering Ingegneria Informatica"
    description: "Built full-stack web apps in Angular and Spring Boot across healthcare and finance, tuning databases on Oracle, SQL Server and PostgreSQL. Led a legacy document system's rewrite onto a modern stack and mentored two juniors into the team."
  - date: "2019 - 2022"
    title: "Software Engineer · Bridge Consulting"
    description: "Designed and shipped software on Spring Boot, Docker and Vue.js, including a tool that automated industrial report generation and cut delivery times. Worked code review with a focus on security and quality, and turned client requirements into working software."
  - date: "2017 - 2019"
    title: "Junior Software Engineer · Omnia Service"
    description: "Designed, built and tested Java applications to spec, versioning with Git and SVN inside an eight-engineer team. Worked closely with technical support to track down and fix bugs, improving the stability of applications in production."
