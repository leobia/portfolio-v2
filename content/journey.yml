label: Journey
tagline: // how I got here

entries:
  - date: "2024 — Now"
    title: "Software Developer · Opus, Savino del Bene"
    description: "Main developer at the company's logistics startup, building the platform that powers B2B shipping. Migrated the stack from a consultant-run setup to a company-owned Kubernetes (AKS) cluster and put CI/CD in place across every project."
  - date: "2022 — 2024"
    title: "Solution Developer · Engineering Ingegneria Informatica"
    description: "Built full-stack web apps in Angular and Spring Boot across healthcare and finance, tuning databases on Oracle, SQL Server and PostgreSQL. Led a legacy document system's rewrite onto a modern stack and mentored two juniors into the team."
  - date: "2019 — 2022"
    title: "Software Developer · Bridge Consulting"
    description: "Designed and shipped software on Spring Boot, Docker and Vue.js, including a tool that automated industrial report generation and cut delivery times. Held the line in code review on security and quality, turning client needs into software."
  - date: "2017 — 2019"
    title: "Software Developer · Omnia Service"
    description: "Designed, built and tested Java applications to spec, versioning with Git and SVN inside an 8-developer team. Worked closely with technical support to track down and fix bugs, improving the stability of applications in production."
